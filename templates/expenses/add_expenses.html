{% extends 'base.html' %}



{% block content %}

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb" style="
        background-color: #dddddd;
        padding-left:1%;
        margin-top:1%; 
        padding-top:0.5%;
        padding: .75rem 1rem;">
          <li class="breadcrumb-item"><a href="{% url 'expenses' %}" style="text-decoration:none;">Expenses</a></li>
          <li class="breadcrumb-item active" aria-current="page">Add Expenses</li>
        </ol>
      </nav>

        <div class="card">
            <div class="card-body">
                <form action="{% url 'add_expenses' %}" method="post">{% csrf_token %}
                <div class="form-group">
                    <label for="">Amount</label>
                    <input type="number" class="form-control form-control-sm" name="amount" value="{{values.amount}}" />
                </div><br>
                <div class="form-group">
                    <label for="">Description</label>
                    <input type="text" class="form-control form-control-sm" name="description" value="{{values.description}}" />
                </div><br>
                <div class="form-group">
                    <label for="">Category</label>
                    <select name="category" class="form-control form-control-sm" value="{{values.category}}">
                        {% for category in categories %}
                        <option name="category" value="{{category.name}}">{{category.name}}</option>
                        {% endfor %}
                    </select>
                </div><br>
                <div class="form-group">
                    <label for="">Payment Type</label>
                    <input type="text" class="form-control form-control-sm" name="payment_type" value="{{values.payment_type}}" />
                </div>
                <br>
                <div class="form-group">
                    <label for="">Date of Expense</label>
                    <input type="date" class="form-control form-control-sm" name="expense_date" />
                </div><br>

                <input type="submit" value="Save Expense" class="btn btn-primary btn-primary-sm" />

            </form>
            </div>
        </div>


</div>


{% endblock %}
